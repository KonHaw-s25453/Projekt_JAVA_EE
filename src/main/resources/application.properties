spring.application.name=asms

# Server
server.port=8080
server.servlet.context-path=/

# Database - MySQL (override via environment variables DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:asms}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT (override JWT_SECRET env var in production)
app.jwt.secret=${JWT_SECRET:asmsSecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLong1234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.asms=DEBUG
logging.level.org.springframework.security=INFO
