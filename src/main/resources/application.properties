spring.application.name=asms

# Server
server.port=8080
server.servlet.context-path=/

# Database - MySQL (default)
spring.datasource.url=jdbc:mysql://localhost:3306/asms?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=asmsSecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLong1234567890
app.jwt.expiration-ms=86400000

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.asms=DEBUG
logging.level.org.springframework.security=INFO
